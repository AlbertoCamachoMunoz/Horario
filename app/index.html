<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2196F3">
    <title>Horarios - Gestión de Empleados</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1 id="app-title">Horarios</h1>
            <button id="menu-toggle" aria-label="Abrir menú">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </div>
    </header>

    <nav id="side-menu">
        <ul>
            <li><a href="#" onclick="HorariosApp.ui.switchView('calendar'); return false;">Calendario</a></li>
            <li><a href="#" onclick="HorariosApp.ui.switchView('employees'); return false;">Gestionar Empleados</a></li>
            <li><a href="#" onclick="HorariosApp.ui.switchView('prices'); return false;">Precios por Hora</a></li>
            <li><a href="#" onclick="HorariosApp.ui.switchView('settings'); return false;">Configuración</a></li>
        </ul>
    </nav>

    <main id="app-container">
        <div id="view-calendar" class="view">
            <div id="calendar-header" class="calendar-controls">
                <button id="prev-month" class="nav-btn" aria-label="Mes anterior">&lt;</button>
                <div id="month-year-picker" class="date-display">
                    <span id="current-month-label">Marzo</span>
                    <span id="current-year-label">2026</span>
                </div>
                <button id="next-month" class="nav-btn" aria-label="Mes siguiente">&gt;</button>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
        </div>
        
        <div id="view-employees" class="view">
            <div class="view-header">
                <h2>Gestión de Empleados</h2>
                <button id="btn-add-employee" class="btn-primary">Añadir Empleado</button>
            </div>
            
            <div id="form-employee" class="card hidden">
                <h3 id="employee-form-title">Nuevo Empleado</h3>
                <form id="employee-details-form">
                    <input type="hidden" id="emp-id">
                    <div class="form-group">
                        <label for="emp-nombre">Nombre *</label>
                        <input type="text" id="emp-nombre" required placeholder="Nombre completo">
                    </div>
                    <div class="form-group">
                        <label for="emp-tlf">Teléfono</label>
                        <input type="tel" id="emp-tlf" placeholder="600 000 000">
                    </div>
                    <div class="form-group">
                        <label for="emp-direccion">Dirección</label>
                        <input type="text" id="emp-direccion" placeholder="Calle, Número...">
                    </div>
                    <div class="form-group checkbox">
                        <input type="checkbox" id="emp-vehiculo">
                        <label for="emp-vehiculo">¿Tiene vehículo?</label>
                    </div>
                    <div class="form-group checkbox">
                        <input type="checkbox" id="emp-activo" checked>
                        <label for="emp-activo">Empleado Activo</label>
                    </div>
                    <div class="form-actions">
                        <button type="button" id="btn-cancel-employee" class="btn-secondary">Cancelar</button>
                        <button type="submit" class="btn-primary">Guardar</button>
                    </div>
                </form>
            </div>

            <div id="employees-list" class="list-container">
                <!-- Se cargará dinámicamente -->
                <p class="empty-msg">Cargando empleados...</p>
            </div>
        </div>

        <div id="view-day-hours" class="view">
            <div class="view-header">
                <button onclick="HorariosApp.ui.switchView('calendar')" class="btn-secondary">&larr; Volver</button>
                <h2 id="selected-day-title">Día X</h2>
            </div>
            <div class="card">
                <div class="form-group">
                    <label>Horas para TODOS los empleados:</label>
                    <div style="display:flex; gap:10px;">
                        <input type="number" id="all-employees-hours" placeholder="Ej: 8" min="1">
                        <button id="btn-apply-all" class="btn-primary">Aplicar</button>
                    </div>
                </div>
            </div>
            <div id="day-employees-list" class="list-container">
                <!-- Se cargará la lista de empleados con sus inputs de horas -->
            </div>
            <div class="form-actions" style="margin-top: 20px;">
                <button id="btn-save-hours" class="btn-primary" style="width:100%; padding:15px;">GUARDAR HORAS</button>
            </div>
        </div>

        <div id="view-prices" class="view">
            <div class="view-header">
                <h2>Precios por Hora</h2>
                <button id="btn-add-price" class="btn-primary">Nuevo Precio</button>
            </div>
            <div id="form-price" class="card hidden">
                <form id="price-form">
                    <div class="form-group">
                        <label>Precio (€/hora)</label>
                        <input type="number" step="0.01" id="price-value" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha de inicio</label>
                        <input type="date" id="price-date" required>
                    </div>
                    <div class="form-actions">
                        <button type="button" id="btn-cancel-price" class="btn-secondary">Cancelar</button>
                        <button type="submit" class="btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
            <div id="prices-list" class="list-container"></div>
        </div>

        <div id="view-settings" class="view">
            <h2>Configuración</h2>
            <p>Próximamente...</p>
        </div>
    </main>

    <div id="toast-container"></div>

    <!-- Scripts cargados manualmente en orden de dependencia -->
    <script src="js/db.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/employees.js"></script>
    <script src="js/hours.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
